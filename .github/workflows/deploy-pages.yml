name: Deploy to GitHub Pages

# Personal GitHub Pages deploy for the tinyland-goo static spoke.
# Builds through the full scaffold toolchain (Nix devshell + `just`) so
# CI == local == deploy — this is the house DEFAULT deploy lane (TIN-2230
# Option A), the same Nix path the canonical site.scaffold and the live
# cousin formal_transfemme_sewing use. (An earlier revision wrongly ran this
# on pinned Node + corepack pnpm; that was a self-inflicted divergence.)

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7

      - uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Install workspace dependencies
        run: nix develop --command just setup

      - name: Build static site (project base path = /tinyland-goo)
        run: nix develop --command just build
        env:
          NODE_ENV: production
          BASE_PATH: /tinyland-goo

      - uses: actions/upload-pages-artifact@v5
        with:
          path: build

  deploy:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v5
        id: deployment
