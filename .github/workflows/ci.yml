name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'

      - name: Install gitleaks
        run: |
          GL=8.21.2
          curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v${GL}/gitleaks_${GL}_linux_x64.tar.gz" \
            | sudo tar -xz -C /usr/local/bin gitleaks
      - name: Secrets scan (working tree)
        run: gitleaks dir --config .gitleaks.toml --redact --verbose .

      - run: npm install
      - name: Conformance (static-spoke subset)
        run: bash scripts/check-conformance.sh
      - name: Type check
        run: npm run check
      - name: Build (project base path)
        run: BASE_PATH="/${GITHUB_REPOSITORY#*/}" npm run build
