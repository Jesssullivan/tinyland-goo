<!doctype html>
<html lang="en" data-theme="omux" data-mode="light">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<!-- Per-page title/description/canonical/OG/JSON-LD come from $lib/components/SEOHead.svelte. -->
		<meta name="color-scheme" content="light dark" />
		<link rel="icon" href="%sveltekit.assets%/favicon.svg" type="image/svg+xml" />
		<script>
			// FOUC prevention: apply data-mode + data-theme before Svelte mounts.
			(function () {
				try {
					var stored = localStorage.getItem('color-mode');
					var prefers = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
					var mode = stored === 'light' || stored === 'dark' ? stored : prefers ? 'dark' : 'light';
					document.documentElement.setAttribute('data-mode', mode);
					document.documentElement.style.colorScheme = mode;
				} catch (e) {
					// localStorage unavailable — keep defaults.
				}
			})();
		</script>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
