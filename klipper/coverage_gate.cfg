# coverage_gate.cfg — Klipper pre-print glue-coverage gate
# ---------------------------------------------------------
# Aborts a print if UV-measured strontium-aluminate glue coverage is below a
# threshold. Include this from printer.cfg:  [include coverage_gate.cfg]
#
# Requires the community `gcode_shell_command` extension (install via KIAUH:
# [4] Advanced -> [8] G-Code Shell Command), and coverage_gate.py on the host.
#
# Flow:
#   PRINT_START -> RUN_SHELL_COMMAND (reads AS7341, SAVE_VARIABLEs the result)
#               -> _COVERAGE_GATE   (re-reads saved vars, aborts if too low)
#               -> _PRINT_START_REAL (your normal heat/home/mesh/purge sequence)

[gcode_shell_command measure_coverage]
command: /usr/bin/env python3 /home/pi/printer_data/scripts/coverage_gate.py
timeout: 15.
verbose: True

[save_variables]
filename: ~/printer_data/config/saved_vars.cfg

[gcode_macro PRINT_START]
gcode:
    {% set min_cov = params.MIN_COVERAGE|default(70)|float %}
    M117 Checking glue coverage...
    # Stage 1: host reads the sensor and persists the verdict to saved_vars.
    RUN_SHELL_COMMAND CMD=measure_coverage PARAMS={min_cov}
    # Stage 2: evaluate the gate in a separate macro so the freshly written
    # save_variables dict is re-read at this macro's evaluation time.
    _COVERAGE_GATE MIN_COVERAGE={min_cov}
    # ---- only reached if the gate passed ----
    _PRINT_START_REAL {rawparams}

[gcode_macro _COVERAGE_GATE]
gcode:
    {% set min_cov = params.MIN_COVERAGE|default(70)|float %}
    {% set svv     = printer.save_variables.variables %}
    {% set cov     = svv.coverage_pct|default(-1)|float %}
    {% set status  = svv.coverage_status|default("UNKNOWN") %}
    {% if status == "ERROR" or cov < 0 %}
        { action_raise_error("COVERAGE GATE: sensor read failed (status=%s). Aborting." % status) }
    {% elif cov < min_cov %}
        { action_raise_error("COVERAGE GATE: glue coverage %.1f%% < required %.1f%%. Re-glue the bed and restart." % (cov, min_cov)) }
    {% else %}
        M117 Coverage OK: { "%.1f%%" % cov }
    {% endif %}

[gcode_macro _PRINT_START_REAL]
gcode:
    # Replace with your real start sequence (heat soak, home, QGL/mesh, purge).
    M140 S{params.BED|default(60)}
    M104 S{params.EXTRUDER|default(200)}
    G28
    # ... bed mesh, prime line ...
